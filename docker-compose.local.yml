services:
  act-runner:
    build:
      context: .
      dockerfile: Dockerfile.local
    image: acthub-act-runner:latest
    container_name: acthub-act-runner
    working_dir: /workspace
    entrypoint: ["act"]
    command: ["--help"]
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    restart: "no"
