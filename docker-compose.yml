services:
  acthub:
    build:
      context: .
      dockerfile: Dockerfile.deploy
    image: acthub-deploy:latest
    container_name: acthub-app
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8080
      MONGODB_URI: mongodb://mongo:27017/acthub
      REPOS_ROOT: /app/runtime/repos
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - acthub_runtime:/app/runtime
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: acthub-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - acthub_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  acthub_mongo_data:
  acthub_runtime:
